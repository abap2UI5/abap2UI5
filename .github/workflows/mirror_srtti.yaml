name: mirror_srtti

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 1 * *'

permissions:
  contents: read

jobs:
  mirror_srtti:
    # Origin repo only
    permissions:
      contents: write  # for peter-evans/create-pull-request to create branch
      pull-requests: write  # for peter-evans/create-pull-request to create a PR
      issues: write  # to report failed scheduled runs
    if: github.repository == 'abap2UI5/abap2UI5'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
    - name: run
      run: |
        git clone https://github.com/abap2UI5/srtti_mirror.git
        rm src/00/02/z*
        cp srtti_mirror/src/z* src/00/02/
        rm -rf srtti_mirror
        git status
    - name: Open PR
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        title: mirror-srtti-update
        branch: mirror-srtti-update
    # A silently failing cron job means the breakage quietly goes unnoticed -
    # open (or bump) an issue so somebody sees it.
    - name: Report scheduled failure as issue
      if: failure() && github.event_name == 'schedule'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const title = `Scheduled workflow failed: ${context.workflow}`;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
          });
          const existing = issues.find((issue) => issue.title === title);
          if (existing) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: existing.number, body: `Failed again: ${runUrl}`,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title,
              body: `The scheduled run failed. Without this issue the breakage would go unnoticed until the next manual check.\n\nRun: ${runUrl}`,
            });
          }
