name: build_rename

# Runs the existing rename script (npm run rename, config
# .github/abaplint/rename_test.jsonc) and pushes the renamed sources to
# the branch "rename" — ready to pull with abapGit. The renaming itself
# is fully defined by the script and its config; this workflow only wraps
# it and stores the result. Re-running updates the branch to the current
# main state; without content changes nothing is pushed. The main commit
# is carried as second parent so GitHub shows the branch as "ahead"
# instead of "behind" main.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build_rename
  cancel-in-progress: false

jobs:
  build_rename:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    # the existing rename script; writes the renamed sources to
    # .github/abaplint/output/<workspace path>/src
    - run: npm run rename

    # branch content: the renamed src tree plus the abapGit descriptor
    # and the license from main
    - name: Assemble branch content
      run: |
        src=$(find .github/abaplint/output -type d -name src | head -n 1)
        if [ -z "$src" ]; then
          echo "::error::no renamed src folder found under .github/abaplint/output"
          exit 1
        fi
        out=.github/out/rename
        rm -rf "$out"
        mkdir -p "$out"
        cp -r "$src" "$out/src"
        cp .abapgit.xml LICENSE "$out/"

    - name: Push branch rename
      run: |
        b=rename
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git fetch origin "$b" --depth 1 2>/dev/null || true
        parent=$(git rev-parse -q --verify "refs/remotes/origin/$b" || true)
        index="$RUNNER_TEMP/index-$b"
        rm -f "$index"
        (cd ".github/out/$b" && GIT_DIR="$GITHUB_WORKSPACE/.git" GIT_WORK_TREE=. GIT_INDEX_FILE="$index" git add -A)
        tree=$(GIT_INDEX_FILE="$index" git write-tree)
        if [ -n "$parent" ] && [ "$(git rev-parse "$parent^{tree}")" = "$tree" ]; then
          echo "$b: no changes"
          exit 0
        fi
        commit=$(git commit-tree "$tree" ${parent:+-p "$parent"} -p "$GITHUB_SHA" -m "build: $b from $GITHUB_SHA")
        git push origin "$commit:refs/heads/$b"
        echo "$b: pushed $commit"
