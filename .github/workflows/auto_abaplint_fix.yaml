name: auto_abaplint_fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  auto_abaplint_fix:
    if: github.repository == 'abap2UI5/abap2UI5'
    permissions:
      contents: write
      pull-requests: write
      issues: write  # to report failed scheduled runs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: run transformation
        run: |
          npm ci
          npm run auto_abaplint

      - name: Open PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          title: abaplint-auto-fixes-formatting
          branch: abaplint-auto-fixes-formatting
      - name: Report scheduled failure as issue
        if: failure() && github.event_name == 'schedule'
        uses: ./.github/actions/report-scheduled-failure
