name: auto_abaplint_fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  auto_abaplint_fix:
    if: github.repository == 'abap2UI5/abap2UI5'
    permissions:
      contents: write
      pull-requests: write
      issues: write  # to report failed scheduled runs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: run transformation
        run: |
          npm ci
          npm run auto_abaplint

      - name: Open PR
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8.0.0
        with:
          title: abaplint-auto-fixes-formatting
          branch: abaplint-auto-fixes-formatting
      # A silently failing cron job means the breakage quietly goes unnoticed -
      # open (or bump) an issue so somebody sees it.
      - name: Report scheduled failure as issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const title = `Scheduled workflow failed: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body: `Failed again: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title,
                body: `The scheduled run failed. Without this issue the breakage would go unnoticed until the next manual check.\n\nRun: ${runUrl}`,
              });
            }
