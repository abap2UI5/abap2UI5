name: test_browser

on:
  pull_request:

concurrency:
  group: test_browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test_unit_js:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - name: Run JS unit tests
      run: cd node && npx playwright test --config=playwright-unit.config.js

  test_browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - run: npm run auto_downport
    - run: npm run auto_transpile
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v6
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
    - name: Install Playwright OS dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps
    - name: Run browser tests against the transpiled backend
      run: cd node && npx playwright test --config=playwright.config.js
