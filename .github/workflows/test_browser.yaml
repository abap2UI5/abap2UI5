name: test_browser

on:
  pull_request:

concurrency:
  group: test_browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test_unit_js:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Run JS unit tests
      run: cd node && npx playwright test --config=playwright-unit.config.js

  test_browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm run auto_downport
    - run: npm run auto_transpile
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
    - name: Run browser tests against the transpiled backend
      run: cd node && npx playwright test --config=playwright.config.js
