name: UI5_2X

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: UI5_2X-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  UI5_2X:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
    - run: cd app && npm ci
    - name: ui5lint (fails when new errors exceed the accepted baseline)
      run: node .github/scripts/ui5lint-gate.mjs
