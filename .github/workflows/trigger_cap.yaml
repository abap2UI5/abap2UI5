name: trigger_cap

# Keeps cap2UI5/cap2UI5 in sync with this repository, same pattern as
# trigger_local for abap2UI5-local: every push to main refreshes the
# input/abap2UI5 snapshot in cap2UI5 and pushes it to its main branch via
# a deploy key. That push then triggers the "sync from upstream" workflow
# over there, which transpiles the new input and copies it into the CAP
# project. The weekly full sync cron in cap2UI5 remains as a safety net.
#
# Requires the secret ACTION_KEY_CAP: the private half of a deploy key
# registered on cap2UI5/cap2UI5 with write access (same pattern as
# ACTION_KEY_LOCAL for the abap2UI5-local repository).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trigger_cap
  cancel-in-progress: false

jobs:
  trigger_cap:
    if: github.repository == 'abap2UI5/abap2UI5'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout abap2UI5 (this repo)
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: upstream

    - name: Checkout cap2UI5 via deploy key
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: cap2UI5/cap2UI5
        ref: main
        ssh-key: ${{ secrets.ACTION_KEY_CAP }}
        path: cap

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'

    # Same snapshot step the sync pipeline in cap2UI5 runs, only fed from
    # this checkout so the refresh happens on every upstream push.
    - name: Refresh input/abap2UI5 snapshot
      working-directory: cap
      run: MIRROR_SOURCE="$GITHUB_WORKSPACE/upstream" npm run mirror_abap2ui5

    - name: Commit and push to cap2UI5 main
      working-directory: cap
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add input/abap2UI5
        if git diff --cached --quiet; then
          echo "input/abap2UI5: no changes"
        else
          git commit -m "mirror: update input/abap2UI5 ($(cut -c1-12 input/abap2UI5/UPSTREAM_COMMIT))"
          git pull --rebase origin main
          git push origin HEAD:main
        fi
