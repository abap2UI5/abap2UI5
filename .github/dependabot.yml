# Keep the two npm dependency trees and the GitHub Actions pinned versions
# up to date and covered by security alerts.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      abaplint:
        patterns:
          - "@abaplint/*"

  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      ui5-tooling:
        patterns:
          - "@ui5/*"
          - "@sap/*"
          - "@sap-ux/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
