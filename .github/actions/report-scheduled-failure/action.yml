name: report-scheduled-failure
description: >
  Open (or bump) an issue when a scheduled workflow run fails. A silently
  failing cron job means the breakage quietly goes unnoticed - the issue
  makes somebody see it. Call with
  `if: failure() && github.event_name == 'schedule'`; requires the repo to
  be checked out and `issues: write` permission.

runs:
  using: composite
  steps:
    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const title = `Scheduled workflow failed: ${context.workflow}`;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
          });
          const existing = issues.find((issue) => issue.title === title);
          if (existing) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: existing.number, body: `Failed again: ${runUrl}`,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title,
              body: `The scheduled run failed. Without this issue the breakage would go unnoticed until the next manual check.\n\nRun: ${runUrl}`,
            });
          }
